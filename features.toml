[[route]]
id = "route/add-number-domain"
task = "Add a number domain"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-numbers/numbers", why = "The number row owns reusable number domains and their runtime libraries." },
  { specimen = "spec-test/sim-numbers/crates/sim-lib-numbers-tensor/src/implementation/citizen", why = "The tensor citizen test checks runtime projection for a number domain." },
]

[[route]]
id = "route/use-tensor-operations"
task = "Use tensor operations"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-numbers/tensors", why = "The tensor row owns the storage-polymorphic runtime value, checked observation, typed tensor descriptors, broadcasting, and matrix-operation libraries." },
  { specimen = "spec-test/sim-numbers/crates/sim-lib-numbers-tensor/src/implementation/citizen", why = "The checked tensor citizen specimen proves runtime projection and semantic reconstruction for the canonical Tensor value." },
]

[[route]]
id = "route/run-numeric-pipeline"
task = "Run a numeric pipeline"
audiences = ["code", "framework"]
steps = [
  { feature = "feature/sim-numbers/numeric-pipelines", why = "The numeric pipeline row owns composed pipeline values and the numeric registry execution path." },
  { specimen = "spec-test/sim-numbers/crates/sim-lib-numbers-numeric/src/pipeline_run", why = "The checked pipeline-run specimen proves composed run input parsing and fail-closed tensor-state handling." },
]
