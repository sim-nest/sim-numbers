[[feature]]
id = "feature/sim-numbers/numeric-pipelines"
title = "Numeric pipelines"
summary = "Compose differentiator, quadrature, and ODE methods into inspectable numeric pipeline values and execute them through registered numeric plugins."
owner = "crate/sim-lib-numbers-numeric"
audiences = ["code", "framework"]
guidance = "Use this row when composing or running numeric jobs through the numeric registry. Executable composed pipelines use f64 state; tensor state descriptors fail closed in this package."
